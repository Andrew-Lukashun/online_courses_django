{% extends "base.html" %}
{% load bootstrap5 %}

{% block title %}Courses{% endblock %}

{% block content %}
<br>
<br>

<div class="container-sm">
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        {% bootstrap_button button_type="submit" content="OK" %}
        <a href="{% url 'courses' %}" type="button" class="btn btn-outline-primary">Back to courses</a>
    </form>
</div>
{% endblock %}
